name: Sync Proposals from Drive

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-proposals
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet google-api-python-client google-auth

      - name: Sync from Drive
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python .github/scripts/sync_drive.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A proposals/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "sync from Drive"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel deploy
        if: steps.commit.outputs.pushed == 'true'
        run: curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
